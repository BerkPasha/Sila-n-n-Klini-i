<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="120" height="150">
  <defs>
    <!-- Ten: sıcak açık -->
    <radialGradient id="fG" cx="46%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FFD9A8"/>
      <stop offset="100%" stop-color="#F0B47A"/>
    </radialGradient>
    <!-- Parlak kızıl saç (vivid red) -->
    <linearGradient id="hG" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%"   stop-color="#E83212"/>
      <stop offset="52%"  stop-color="#C82008"/>
      <stop offset="100%" stop-color="#921200"/>
    </linearGradient>
    <!-- Saç parlaklık overlay -->
    <radialGradient id="hsG" cx="38%" cy="16%" r="54%">
      <stop offset="0%"   stop-color="rgba(255,165,90,0.70)"/>
      <stop offset="100%" stop-color="rgba(255,165,90,0)"/>
    </radialGradient>
    <!-- Önlük: beyaz -->
    <linearGradient id="cG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F2F7FC"/>
      <stop offset="100%" stop-color="#D2DFED"/>
    </linearGradient>
  </defs>

  <!-- ═══ ÖNLÜK GÖVDESİ ═══ -->

  <!-- Sol kol -->
  <path d="M21,80 L13,88 L10,132 L19,134 L24,94 L27,81Z"
        fill="url(#cG)" stroke="#BCCADA" stroke-width="1"/>
  <!-- Sağ kol -->
  <path d="M99,80 L107,88 L110,132 L101,134 L96,94 L93,81Z"
        fill="url(#cG)" stroke="#BCCADA" stroke-width="1"/>

  <!-- Önlük ana gövde -->
  <path d="M21,80 L17,150 L103,150 L99,80 Q81,72 60,72 Q39,72 21,80Z"
        fill="url(#cG)" stroke="#BCCADA" stroke-width="1"/>

  <!-- Teal scrub yaka açıklığı -->
  <path d="M51,80 L60,70 L69,80 L64,100 L56,100Z" fill="#2EA68A"/>

  <!-- Yaka (lapel) sol -->
  <path d="M60,76 L43,98 L47,150 L60,118Z"
        fill="#E5EEF7" stroke="#B8C8D6" stroke-width="0.8"/>
  <!-- Yaka (lapel) sağ -->
  <path d="M60,76 L77,98 L73,150 L60,118Z"
        fill="#E5EEF7" stroke="#B8C8D6" stroke-width="0.8"/>

  <!-- Stetoskop — boyundan sarkan U şekli -->
  <path d="M48,74 Q42,84 41,95 Q40,104 46,107"
        fill="none" stroke="#2E3840" stroke-width="3" stroke-linecap="round"/>
  <path d="M72,74 Q78,84 79,95 Q80,104 74,107"
