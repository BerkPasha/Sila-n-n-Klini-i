  <rect x="95.5" y="113" width="14" height="18" rx="1.5"
        fill="#3A90B4" opacity="0.85"/>
  <circle cx="102.5" cy="134.5" r="1.5" fill="#4A5A6A"/>
  <!-- Sağ el (tableti tutuyor) -->
  <ellipse cx="108" cy="124" rx="8" ry="5.5" fill="#FFD9A8"
           transform="rotate(10,108,124)"/>

  <!-- ═══ BOYUN ═══ -->
  <rect x="54" y="68" width="12" height="10" rx="5" fill="#FFD9A8"/>
  <ellipse cx="60" cy="77" rx="6" ry="2.5" fill="rgba(165,90,35,0.14)"/>

  <!-- ═══ KULAKLAR ═══ -->
  <ellipse cx="37"   cy="40" rx="5.5" ry="7.5" fill="#FFD9A8"/>
  <ellipse cx="37.5" cy="40" rx="3"   ry="5"   fill="#F2A07A"/>
  <ellipse cx="83"   cy="40" rx="5.5" ry="7.5" fill="#FFD9A8"/>
  <ellipse cx="82.5" cy="40" rx="3"   ry="5"   fill="#F2A07A"/>

  <!-- ═══ SAÇ — BOB KESİM (yüzden önce çizilir) ═══ -->

  <!-- Tam saç silüeti: tepeden çene altına inen bob -->
  <path d="M35,16 Q37,4 60,3 Q83,4 85,16
           Q89,32 88,62 Q85,76 77,78
           Q66,80 60,80 Q54,80 43,78
           Q35,76 32,62
           Q31,32 35,16Z"
