  <!-- Patlama alt kenar hafif vurgusu -->
  <path d="M36,31.5 Q60,29 84,31.5"
        fill="none" stroke="rgba(255,130,70,0.28)"
        stroke-width="1.6" stroke-linecap="round"/>

  <!-- Patlama saç doku çizgileri -->
  <path d="M42,19 Q55,13 72,18"
        fill="none" stroke="rgba(108,16,2,0.36)"
        stroke-width="1.1" stroke-linecap="round"/>
  <path d="M45,13 Q60,8 75,13"
        fill="none" stroke="rgba(108,16,2,0.28)"
        stroke-width="1" stroke-linecap="round"/>

  <!-- ═══ KAŞLAR ═══ -->
  <path d="M41,33.5 Q49.5,28.5 57.5,31.5"
        fill="none" stroke="#8A2008"
        stroke-width="2.5" stroke-linecap="round"/>
  <path d="M62.5,31.5 Q70.5,28.5 79,33.5"
        fill="none" stroke="#8A2008"
        stroke-width="2.5" stroke-linecap="round"/>

  <!-- ═══ GÖZLER ═══ -->
  <!-- Göz akları -->
  <ellipse cx="48" cy="41" rx="8.5" ry="6.5" fill="white"/>
  <ellipse cx="72" cy="41" rx="8.5" ry="6.5" fill="white"/>
  <!-- İris -->
  <circle cx="48" cy="41" r="5"   fill="#5A3210"/>
  <circle cx="72" cy="41" r="5"   fill="#5A3210"/>
  <!-- Göz bebeği -->
  <circle cx="48" cy="41" r="2.9" fill="#120C06"/>
  <circle cx="72" cy="41" r="2.9" fill="#120C06"/>
  <!-- Işık noktaları -->
  <circle cx="49.9" cy="39.2" r="1.8" fill="rgba(255,255,255,0.96)"/>
  <circle cx="73.9" cy="39.2" r="1.8" fill="rgba(255,255,255,0.96)"/>
  <circle cx="47"   cy="42.6" r="0.9" fill="rgba(255,255,255,0.50)"/>
  <circle cx="71"   cy="42.6" r="0.9" fill="rgba(255,255,255,0.50)"/>
  <!-- Üst göz kapağı -->
  <path d="M39.5,38.5 Q48,34.5 56.5,38.5"
        fill="none" stroke="rgba(34,14,4,0.78)" stroke-width="1.6"/>
  <path d="M63.5,38.5 Q72,34.5 80.5,38.5"
        fill="none" stroke="rgba(34,14,4,0.78)" stroke-width="1.6"/>
  <!-- Alt göz kapağı (hafif) -->
  <path d="M40.5,44.5 Q48,47 55.5,44.5"
        fill="none" stroke="rgba(34,14,4,0.20)" stroke-width="1"/>
  <path d="M64.5,44.5 Q72,47 79.5,44.5"
        fill="none" stroke="rgba(34,14,4,0.20)" stroke-width="1"/>

  <!-- ═══ BURUN (minimal, zarif) ═══ -->
  <path d="M57.5,50 Q60,54 62.5,50"
        fill="none" stroke="rgba(158,72,32,0.55)"
        stroke-width="1.9" stroke-linecap="round"/>

  <!-- ═══ GÜLÜMSEME — ince dudak, neşeli ═══ -->
  <!-- Dudak dolgusu -->
  <path d="M53.5,58 Q57,56 60,57 Q63,56 66.5,58
           Q63.5,64 60,64.5 Q56.5,64 53.5,58Z"
        fill="#C87272"/>
  <!-- Gülümseme çizgisi -->
  <path d="M54.5,58.5 Q60,64 65.5,58.5"
        fill="none" stroke="#A05050"
        stroke-width="1.3" stroke-linecap="round"/>
  <!-- Üst dudak çizgisi -->
  <path d="M55,58 Q57.5,56.5 60,57 Q62.5,56.5 65,58"
        fill="none" stroke="#AE6060" stroke-width="1"/>
  <!-- Gülümseme çukurları -->
  <circle cx="51.5" cy="60" r="1.4" fill="rgba(186,72,66,0.37)"/>
  <circle cx="68.5" cy="60" r="1.4" fill="rgba(186,72,66,0.37)"/>

  <!-- ═══ GÖZLÜK — büyük yuvarlak, KOYU çerçeve ═══ -->
  <!-- Cam dolgusu (hafif tint) -->
  <circle cx="48" cy="41" r="12" fill="rgba(130,190,225,0.06)"/>
  <circle cx="72" cy="41" r="12" fill="rgba(130,190,225,0.06)"/>
  <!-- Koyu çerçeveler -->
  <circle cx="48" cy="41" r="12" fill="none" stroke="#221208" stroke-width="2.9"/>
  <circle cx="72" cy="41" r="12" fill="none" stroke="#221208" stroke-width="2.9"/>
  <!-- Köprü -->
  <path d="M59.2,40.8 Q60,38 60.8,40.8"
        fill="none" stroke="#221208" stroke-width="2.4"/>
  <!-- Kollar (kulaklara) -->
  <line x1="36"  y1="40" x2="34"  y2="38"
        stroke="#221208" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="84"  y1="40" x2="86"  y2="38"
        stroke="#221208" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Cam parlaklığı -->
  <path d="M41,33.5 Q45.5,30 49,33.5"
        fill="none" stroke="rgba(255,255,255,0.56)"
        stroke-width="1.5" stroke-linecap="round"/>
  <path d="M65,33.5 Q69.5,30 73,33.5"
        fill="none" stroke="rgba(255,255,255,0.56)"
        stroke-width="1.5" stroke-linecap="round"/>
</svg>
