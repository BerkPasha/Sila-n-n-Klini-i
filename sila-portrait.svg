  <!-- Saç parlaklık katmanı -->
  <ellipse cx="55" cy="14" rx="19" ry="9" fill="url(#hsG)"/>

  <!-- Saç yan doku çizgileri (sağ) -->
  <path d="M86,35 Q87,52 86,66"
        fill="none" stroke="rgba(110,18,2,0.20)"
        stroke-width="1.4" stroke-linecap="round"/>
  <!-- Saç yan doku çizgileri (sol) -->
  <path d="M34,35 Q33,52 34,66"
        fill="none" stroke="rgba(110,18,2,0.20)"
        stroke-width="1.4" stroke-linecap="round"/>

  <!-- ═══ YÜZ (saçın üstüne çizilir, merkezi açar) ═══ -->
  <ellipse cx="60" cy="40" rx="23" ry="27" fill="url(#fG)"/>

  <!-- Elmacık kemiği gölgesi (ince yüz) -->
  <path d="M37,47 Q40.5,55 44.5,58"
        fill="none" stroke="rgba(192,105,48,0.23)"
        stroke-width="5" stroke-linecap="round"/>
  <path d="M83,47 Q79.5,55 75.5,58"
        fill="none" stroke="rgba(192,105,48,0.23)"
