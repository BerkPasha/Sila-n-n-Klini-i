  <!-- Çene gölgesi -->
  <path d="M44,59 Q60,68 76,59"
        fill="none" stroke="rgba(162,85,32,0.13)" stroke-width="5"/>

  <!-- Al yanak (allık, belirgin) -->
  <ellipse cx="42"  cy="52" rx="11.5" ry="7.5" fill="rgba(242,68,55,0.19)"/>
  <ellipse cx="78"  cy="52" rx="11.5" ry="7.5" fill="rgba(242,68,55,0.19)"/>

  <!-- ═══ PATLAMA / FRINGE (yüzün üstüne çizilir) ═══ -->
  <!-- Patlama ana şekli -->
  <path d="M35,16 Q37,4 60,3 Q83,4 85,16
           Q87,26 85,32
           Q74,30 60,30 Q46,30 35,32
