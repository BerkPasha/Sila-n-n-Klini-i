  <circle cx="60" cy="115" r="5.5" fill="#2E3840" stroke="#4A6070" stroke-width="1.2"/>
  <circle cx="60" cy="115" r="2.5"  fill="#4888A0"/>

  <!-- Önlük düğmeleri -->
  <circle cx="60" cy="106" r="2"   fill="#A4B4C4"/>
  <circle cx="60" cy="119" r="2"   fill="#A4B4C4"/>

  <!-- Göğüs logosu: kedi silüeti (scrub üzerinde) -->
  <g transform="translate(50,86)">
    <ellipse cx="0" cy="2" rx="4.5" ry="3.5" fill="rgba(255,255,255,0.62)"/>
    <!-- Kedi kulakları -->
    <polygon points="-3,-1.5 -4.8,-5.5 -1.2,-3.5" fill="rgba(255,255,255,0.62)"/>
    <polygon points="3,-1.5 4.8,-5.5 1.2,-3.5"   fill="rgba(255,255,255,0.62)"/>
    <!-- Küçük kuyruk -->
    <path d="M4.5,4 Q7,2 6.5,0" fill="none"
          stroke="rgba(255,255,255,0.62)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Sol el -->
  <ellipse cx="12" cy="130" rx="8" ry="5.5" fill="#FFD9A8"
           transform="rotate(-8,12,130)"/>

  <!-- Tablet (sağ elde) -->
  <rect x="93" y="110" width="19" height="27" rx="2.5"
